<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Research Analyst</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; }
    header p { color: #555; margin-top: 0.4rem; }

    .search-box {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.5rem;
    }
    textarea {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
      min-height: 60px;
    }
    button {
      padding: 0.75rem 1.5rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      align-self: flex-end;
    }
    button:disabled { background: #999; cursor: not-allowed; }

    .mode-row {
      width: 100%;
      max-width: 720px;
      margin-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      color: #555;
      font-size: 0.9rem;
    }
    .mode-row label { display: inline-flex; align-items: center; gap: 0.4rem; }
    .model-picker { display: none; flex-wrap: wrap; gap: 0.6rem; }
    .model-picker.visible { display: flex; }
    .nav-link { color: #1a56db; text-decoration: none; font-weight: 600; }
    .nav-link:hover { text-decoration: underline; }

    #status { margin-top: 1rem; color: #555; font-size: 0.9rem; min-height: 1.2em; }

    #results {
      width: 100%;
      max-width: 720px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .theme-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }
    .theme-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .companies { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
    .company-chip {
      background: #e8f0fe;
      color: #1a56db;
      border-radius: 999px;
      padding: 0.2rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .rationale { font-size: 0.9rem; color: #444; margin-bottom: 0.75rem; }
    details summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: #777;
      user-select: none;
    }
    .citations { margin-top: 0.5rem; padding-left: 1rem; }
    .citations li { font-size: 0.85rem; color: #555; margin-bottom: 0.2rem; }

    .stats-panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem 1.5rem;
    }
    .stats-panel h3 { font-size: 0.9rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .stats-summary { display: flex; gap: 2rem; margin-bottom: 0.75rem; }
    .stat-badge { display: flex; flex-direction: column; }
    .stat-badge .label { font-size: 0.75rem; color: #888; }
    .stat-badge .value { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .stats-table th { text-align: left; color: #888; font-weight: 500; padding: 0.25rem 0.5rem 0.25rem 0; border-bottom: 1px solid #eee; }
    .stats-table td { padding: 0.3rem 0.5rem 0.3rem 0; color: #444; border-bottom: 1px solid #f0f0f0; }
    .stats-table tr:last-child td { border-bottom: none; }
    .agent-name { font-weight: 600; color: #1a1a1a; }

    #results.comparison-results { max-width: 1180px; }
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      align-items: start;
    }
    .model-column {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .model-column h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .model-footer {
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
      color: #555;
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .model-error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #9b2c2c;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.85rem;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .trace-link { color: #1a56db; text-decoration: none; font-weight: 600; }
    .trace-link:hover { text-decoration: underline; }
    @media (max-width: 960px) {
      .comparison-grid { grid-template-columns: 1fr; }
      .search-box { flex-direction: column; }
      button { align-self: stretch; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Market Research Analyst</h1>
    <p>Ask about the agentic AI startup landscape. Powered by a 3-agent LangGraph pipeline.</p>
    <p><a class="nav-link" href="/eval">Open eval dashboard</a></p>
  </header>

  <div class="search-box">
    <textarea
      id="queryInput"
      placeholder='e.g. "Map the key players and approaches in agentic AI platforms"'
    ></textarea>
    <button id="submitBtn" onclick="submitQuery()">Analyze</button>
  </div>
  <div class="mode-row">
    <label>
      <input id="compareToggle" type="checkbox" onchange="toggleCompareMode()" />
      Compare models
    </label>
    <div id="modelPicker" class="model-picker" aria-label="Models to compare">
      <label><input type="checkbox" name="compareModel" value="gemini" checked /> Gemini</label>
      <label><input type="checkbox" name="compareModel" value="llama" checked /> Llama</label>
      <label><input type="checkbox" name="compareModel" value="qwen" checked /> Qwen</label>
      <label><input type="checkbox" name="compareModel" value="nemotron" /> Nemotron</label>
      <label><input type="checkbox" name="compareModel" value="gpt" /> GPT (paid)</label>
    </div>
  </div>
  <div id="status"></div>
  <div id="results"></div>

  <script>
    async function submitQuery() {
      const input = document.getElementById("queryInput");
      const btn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      const query = input.value.trim();
      if (!query) return;

      const compareMode = document.getElementById("compareToggle").checked;
      btn.disabled = true;
      status.textContent = compareMode
        ? "Running model comparison..."
        : "Running Scout -> Mapper -> Critic pipeline...";
      results.innerHTML = "";
      results.className = compareMode ? "comparison-results" : "";

      try {
        if (compareMode) {
          await submitComparison(query);
        } else {
          await submitSingleModel(query);
        }
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    async function submitSingleModel(query) {
      const resp = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || "Server error");
      }
      const data = await resp.json();
      const s = data.stats;
      document.getElementById("status").textContent =
        `Found ${data.themes.length} theme(s) · ${(s.total_latency_ms / 1000).toFixed(1)}s · $${s.total_cost_usd.toFixed(5)}`;
      renderStats(data.stats);
      renderResults(data.themes);
    }

    async function submitComparison(query) {
      const models = selectedModels();
      if (models.length === 0) {
        throw new Error("Select at least one model to compare.");
      }
      const resp = await fetch("/compare", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, models }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || "Server error");
      }
      const data = await resp.json();
      const values = Object.values(data);
      const totalThemes = values.reduce((sum, item) => sum + item.themes.length, 0);
      const failed = values.filter(item => item.error).length;
      const slowest = Math.max(...values.map(item => item.latency_ms || 0));
      const totalCost = values.reduce((sum, item) => sum + (item.cost_usd || 0), 0);
      document.getElementById("status").textContent =
        `Compared ${models.length} model(s) · ${totalThemes} total theme(s) · ${failed} error(s) · slowest ${(slowest / 1000).toFixed(1)}s · $${totalCost.toFixed(5)}`;
      renderComparison(data, models);
    }

    function selectedModels() {
      return Array.from(document.querySelectorAll('input[name="compareModel"]:checked'))
        .map(input => input.value);
    }

    function toggleCompareMode() {
      const compareMode = document.getElementById("compareToggle").checked;
      const picker = document.getElementById("modelPicker");
      picker.classList.toggle("visible", compareMode);
      document.getElementById("submitBtn").textContent = compareMode ? "Compare" : "Analyze";
    }

    function renderStats(stats) {
      const container = document.getElementById("results");
      const agents = [
        { name: "Scout", key: "scout" },
        { name: "Mapper", key: "mapper" },
        { name: "Critic", key: "critic" },
      ];

      const rows = agents.map(({ name, key }) => {
        const a = stats[key] || {};
        const latency = a.latency_ms != null ? `${(a.latency_ms / 1000).toFixed(2)}s` : "—";
        const model = a.model || (key === "scout" ? "FAISS" : "—");
        const tokens = (a.input_tokens != null)
          ? `${a.input_tokens.toLocaleString()} / ${a.output_tokens.toLocaleString()}`
          : "—";
        const cost = a.cost_usd != null ? `$${a.cost_usd.toFixed(5)}` : "—";
        return `<tr>
          <td class="agent-name">${name}</td>
          <td>${model}</td>
          <td>${latency}</td>
          <td>${tokens}</td>
          <td>${cost}</td>
        </tr>`;
      }).join("");

      const panel = document.createElement("div");
      panel.className = "stats-panel";
      panel.innerHTML = `
        <h3>Pipeline Stats</h3>
        <div class="stats-summary">
          <div class="stat-badge">
            <span class="label">Total Latency</span>
            <span class="value">${(stats.total_latency_ms / 1000).toFixed(1)}s</span>
          </div>
          <div class="stat-badge">
            <span class="label">Estimated Cost</span>
            <span class="value">$${stats.total_cost_usd.toFixed(5)}</span>
          </div>
        </div>
        <table class="stats-table">
          <thead>
            <tr>
              <th>Agent</th><th>Model</th><th>Latency</th>
              <th>Tokens (in / out)</th><th>Cost</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      container.appendChild(panel);
    }

    function renderResults(themes) {
      const container = document.getElementById("results");
      renderThemeCards(container, themes);
    }

    function renderComparison(data, models) {
      const container = document.getElementById("results");
      const grid = document.createElement("div");
      grid.className = "comparison-grid";

      models.forEach(model => {
        const result = data[model];
        const column = document.createElement("section");
        column.className = "model-column";
        column.innerHTML = `<h2>${escapeHtml(model)}</h2>`;

        if (result && result.error) {
          const error = document.createElement("div");
          error.className = "model-error";
          error.textContent = result.error;
          column.appendChild(error);
        } else if (!result || !result.themes.length) {
          const empty = document.createElement("p");
          empty.className = "rationale";
          empty.textContent = "No themes returned.";
          column.appendChild(empty);
        } else {
          renderThemeCards(column, result.themes);
        }

        const footer = document.createElement("div");
        footer.className = "model-footer";
        const trace = result && result.trace_url
          ? `<a class="trace-link" href="${escapeHtml(result.trace_url)}" target="_blank" rel="noreferrer">Open trace</a>`
          : "Trace link unavailable";
        footer.innerHTML = `
          <span>Latency: ${result ? (result.latency_ms / 1000).toFixed(1) : "0.0"}s</span>
          <span>Cost: $${result ? result.cost_usd.toFixed(5) : "0.00000"}</span>
          <span>${trace}</span>
        `;
        column.appendChild(footer);
        grid.appendChild(column);
      });

      container.appendChild(grid);
    }

    function renderThemeCards(container, themes) {
      themes.forEach(theme => container.appendChild(createThemeCard(theme)));
    }

    function createThemeCard(theme) {
      const card = document.createElement("div");
      card.className = "theme-card";

      const chips = theme.companies
        .map(c => `<span class="company-chip">${escapeHtml(c)}</span>`)
        .join("");

      const citationItems = theme.citations
        .map(c => `<li>${escapeHtml(c)}</li>`)
        .join("");

      card.innerHTML = `
        <h2>${escapeHtml(theme.theme_name)}</h2>
        <div class="companies">${chips}</div>
        <p class="rationale">${escapeHtml(theme.rationale)}</p>
        <details>
          <summary>Citations (${theme.citations.length})</summary>
          <ul class="citations">${citationItems}</ul>
        </details>
      `;
      return card;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("queryInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitQuery();
    });
  </script>
</body>
</html>
