name: Run Evaluation

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build FAISS index
        run: python data/scripts/ingest.py

      - name: Verify Gemini API key
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: models/gemini-3.1-flash-lite-preview
        run: |
          python -c "
          from langchain_core.messages import HumanMessage
          from agents.llm_client import LLMClient
          c = LLMClient(model='gemini')
          r = c.invoke([HumanMessage(content='ping')])
          print('Gemini OK:', str(r.text)[:40])
          "

      - name: Run evaluation suite
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: models/gemini-3.1-flash-lite-preview
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python eval/evaluator.py --model gemini --cache-dir eval/cache/gemini
